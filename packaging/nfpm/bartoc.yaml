# nfpm package configuration for bartoc (x86_64)
# Build with: VERSION=<ver> nfpm package --config packaging/nfpm/bartoc.yaml --packager deb|rpm --target release-assets/
name: bartoc
arch: amd64
version: ${VERSION}
version_schema: semver
section: net
maintainer: Jason Ozias <jason.g.ozias@gmail.com>
description: |
  Barto job executor client.
  Executes scheduled commands on behalf of a bartos server and streams
  output and status back over WebSocket.
homepage: https://github.com/rustyhorde/barto
license: MIT OR Apache-2.0

overrides:
  deb:
    suggests:
      - logrotate
      - xz-utils
      - age
  rpm:
    suggests:
      - logrotate
      - xz
      - age

scripts:
  postinstall: packaging/nfpm/scripts/bartoc-post-install.sh
  preremove: packaging/nfpm/scripts/bartoc-pre-remove.sh

deb:
  compression: xz

rpm:
  compression: xz

contents:
  # Binary
  - src: bartoc-x86_64-unknown-linux-musl
    dst: /usr/bin/bartoc
    file_info:
      mode: 0755

  # Launcher script (loads secrets: systemd credentials first, then GNOME Keyring / KWallet)
  - src: dist/bartoc/bartoc-launcher
    dst: /usr/lib/bartoc/bartoc-launcher
    file_info:
      mode: 0755

  # Secrets init helper for systemd user credentials (lingering services)
  - src: packaging/nfpm/scripts/bartoc-secrets-init
    dst: /usr/bin/bartoc-secrets-init
    file_info:
      mode: 0755

  # age-encrypted secrets launcher (for systemd 250-255 systems)
  - src: dist/bartoc/bartoc-age-launcher
    dst: /usr/lib/bartoc/bartoc-age-launcher
    file_info:
      mode: 0755

  # age-encrypted secrets init helper
  - src: packaging/nfpm/scripts/bartoc-age-secrets-init
    dst: /usr/bin/bartoc-age-secrets-init
    file_info:
      mode: 0755

  # Systemd user service variant for age-encrypted secrets (systemd 250-255)
  - src: dist/bartoc/bartoc-age.service
    dst: /usr/lib/systemd/user/bartoc-age.service

  # Man page
  - src: dist/bartoc/bartoc.1
    dst: /usr/share/man/man1/bartoc.1

  # Shell completions
  - src: dist/bartoc/bartoc.bash
    dst: /usr/share/bash-completion/completions/bartoc

  - src: dist/bartoc/_bartoc
    dst: /usr/share/zsh/vendor-completions/_bartoc

  - src: dist/bartoc/bartoc.fish
    dst: /usr/share/fish/vendor_completions.d/bartoc.fish

  # Systemd user service
  - src: dist/bartoc/bartoc.service
    dst: /usr/lib/systemd/user/bartoc.service

  # Log rotation helper script
  - src: dist/bartoc/bartoc-logrotate
    dst: /usr/lib/bartoc/bartoc-logrotate
    file_info:
      mode: 0755

  # Systemd user timer for log rotation
  - src: dist/bartoc/bartoc-logrotate.service
    dst: /usr/lib/systemd/user/bartoc-logrotate.service

  - src: dist/bartoc/bartoc-logrotate.timer
    dst: /usr/lib/systemd/user/bartoc-logrotate.timer

  # Example configuration
  - src: dist/bartoc/bartoc.toml.example
    dst: /usr/share/doc/bartoc/examples/bartoc.toml.example

  # Licenses
  - src: dist/bartoc/LICENSE-MIT
    dst: /usr/share/doc/bartoc/LICENSE-MIT

  - src: dist/bartoc/LICENSE-APACHE
    dst: /usr/share/doc/bartoc/LICENSE-APACHE
